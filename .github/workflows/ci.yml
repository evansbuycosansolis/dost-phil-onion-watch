name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  web-and-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build shared packages
        run: pnpm --filter "./packages/**" build

      - name: Lint frontend
        run: pnpm --filter @phil-onion-watch/web lint

      - name: Typecheck frontend
        run: pnpm --filter @phil-onion-watch/web typecheck

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Run API tests
        env:
          DATABASE_URL: sqlite+pysqlite:///./apps/api/app/tests/tmp/ci.db
          FAISS_INDEX_PATH: ./apps/api/app/tests/tmp/ci.index
          FAISS_METADATA_PATH: ./apps/api/app/tests/tmp/ci_meta.json
          REPORTS_PATH: ./apps/api/app/tests/tmp/reports
          SECRET_KEY: ci-secret
        run: pytest apps/api/app/tests -q

  web-e2e:
    runs-on: ubuntu-latest
    needs: [web-and-packages, api-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Install Playwright browser
        run: pnpm --filter @phil-onion-watch/web exec playwright install --with-deps chromium

      - name: Clean Next.js build artifacts
        run: rm -rf apps/web/.next

      - name: Run web E2E release confidence checks
        env:
          SECRET_KEY: ci-secret
          PLAYWRIGHT_API_PORT: "8011"
          PLAYWRIGHT_WEB_PORT: "3100"
        run: pnpm --filter @phil-onion-watch/web test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
