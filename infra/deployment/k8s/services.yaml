apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: phil-onion-watch
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: phil-onion-watch
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: phil-onion-watch
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: phil-onion-watch
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
