apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: phil-onion-watch
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_WITH_64_CHAR_SECRET"
  POSTGRES_PASSWORD: "REPLACE_WITH_STRONG_DB_PASSWORD"
  DATABASE_URL: "postgresql+psycopg://onion:REPLACE_WITH_STRONG_DB_PASSWORD@postgres:5432/phil_onion_watch"
  OIDC_DISCOVERY_URL: "https://id.example.gov/.well-known/openid-configuration"
  OIDC_ISSUER_URL: "https://id.example.gov/"
  OIDC_JWKS_URL: "https://id.example.gov/.well-known/jwks.json"
  OIDC_AUDIENCE: "phil-onion-watch"
  OIDC_ROLE_MAPPING: "{\"super_admin\":[\"pow-admin\"],\"provincial_admin\":[\"pow-provincial-admin\"],\"auditor\":[\"pow-auditor\"]}"
  REPORT_DISTRIBUTION_WEBHOOK_URL: "https://hooks.example.gov/phil-onion-watch/report-distribution"
  NOTIFICATION_WEBHOOK_URL: "https://hooks.example.gov/phil-onion-watch/notifications"
